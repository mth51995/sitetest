<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matheus Instalações</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* MENU */

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

header a{
color:white;
text-decoration:none;
margin-left:15px;
}

/* PROMOÇÃO */

.promo{
background:#ff6a00;
color:white;
text-align:center;
padding:40px;
}

.contador{
font-size:30px;
font-weight:bold;
margin:10px 0;
}

/* HERO */

.hero{
background:#111;
color:white;
text-align:center;
padding:80px 20px;
}

.btn{
background:#ff6a00;
color:white;
padding:15px 30px;
border-radius:30px;
text-decoration:none;
}

/* SERVIÇOS */

.servicos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:30px;
text-align:center;
border-radius:10px;
}

/* SLIDER */

.slider{
max-width:400px;
margin:auto;
position:relative;
}

.slide{
display:none;
}

.slide img{
width:100%;
border-radius:10px;
}

.active{
display:block;
}

.prev,.next{
position:absolute;
top:45%;
background:#ff6a00;
color:white;
border:none;
font-size:25px;
padding:10px;
cursor:pointer;
}

.prev{left:0}
.next{right:0}

</style>

</head>

<body>

<header>

<div>⚡ Matheus Instalações</div>

<div>
<a href="#">Serviços</a>
<a href="#">Contato</a>
</div>

</header>

<!-- PROMOÇÃO -->

<section class="promo">

<h2>Promoção Especial</h2>

<h1>10% DE DESCONTO</h1>

<div class="contador">
<span id="min">30</span>:<span id="seg">00</span>
</div>

<a class="btn" href="https://wa.me/5519981507532">Aproveitar</a>

</section>

<!-- HERO -->

<section class="hero">

<h1>Instalações Elétricas e Ar Condicionado</h1>

<p>Atendimento em Mogi Guaçu</p>

<a class="btn" href="https://wa.me/5519981507532">Orçamento</a>

</section>

<!-- SERVIÇOS -->

<section class="servicos">

<div class="card">
<i class="fa-solid fa-bolt"></i>
<h3>Instalação Elétrica</h3>
</div>

<div class="card">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h3>Manutenção</h3>
</div>

<div class="card">
<i class="fa-solid fa-fan"></i>
<h3>Ar Condicionado</h3>
</div>

</section>

<!-- SLIDER -->

<section>

<h2 style="text-align:center">Instalação de Ar</h2>

<div class="slider">

<div class="slide active">
<img src="https://i.postimg.cc/vHMTmyrL/1773507310615.jpg">
</div>

<div class="slide">
<img src="https://i.postimg.cc/9FV0f2dp/1773507315943.jpg">
</div>

<div class="slide">
<img src="https://i.postimg.cc/NfYF0t6b/1773507325014.jpg">
</div>

<div class="slide">
<img src="https://i.postimg.cc/tCyJgb3F/1773507330614.jpg">
</div>

<button class="prev" onclick="trocar(-1)">❮</button>
<button class="next" onclick="trocar(1)">❯</button>

</div>

</section>

<script>

/* CONTADOR */

let tempo=1800;

setInterval(function(){

let min=Math.floor(tempo/60);
let seg=tempo%60;

document.getElementById("min").innerHTML=min;
document.getElementById("seg").innerHTML=seg;

tempo--;

if(tempo<0){tempo=1800;}

},1000);

/* SLIDE */

let slide=0;

function mostrar(){

let slides=document.querySelectorAll(".slide");

slides.forEach(s=>s.classList.remove("active"));

slides[slide].classList.add("active");

}

function trocar(n){

let slides=document.querySelectorAll(".slide");

slide+=n;

if(slide>=slides.length){slide=0;}

if(slide<0){slide=slides.length-1;}

mostrar();

}

</script>

</body>
</html>
