<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matheus Instalações Elétricas</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:#000;
color:white;
display:flex;
justify-content:space-between;
padding:15px 30px;
z-index:999;
}

header a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* PROMOÇÃO TOPO */

.promo{
margin-top:70px;
background:#ff6a00;
color:white;
text-align:center;
padding:40px 20px;
}

.promo h1{
font-size:40px;
margin:10px 0;
}

.contador{
font-size:30px;
font-weight:bold;
}

/* HERO */

.hero{
background:linear-gradient(120deg,#000,#ff6a00);
color:white;
text-align:center;
padding:80px 20px;
}

.btn{
background:#ff6a00;
color:white;
padding:15px 35px;
border-radius:30px;
text-decoration:none;
display:inline-block;
margin-top:20px;
}

/* SERVIÇOS */

.servicos{
padding:60px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card i{
font-size:35px;
color:#ff6a00;
margin-bottom:10px;
}

/* GALERIA */

.galeria{
text-align:center;
padding:60px 20px;
}

.slider{
max-width:400px;
margin:auto;
position:relative;
}

.slide{
display:none;
}

.slide img{
width:100%;
border-radius:10px;
}

.active{
display:block;
}

.prev,.next{
position:absolute;
top:45%;
background:#ff6a00;
color:white;
border:none;
font-size:25px;
padding:10px 15px;
cursor:pointer;
border-radius:50%;
}

.prev{left:-15px;}
.next{right:-15px;}

/* WHATSAPP */
